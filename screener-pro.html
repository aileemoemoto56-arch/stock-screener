<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本株スクリーナー Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg:#060810; --surface:#0d1220; --card:#111827; --border:#1e2d45;
  --accent:#00e5ff; --green:#00e676; --red:#ff3d5a;
  --yellow:#ffd740; --orange:#ff9100; --purple:#b388ff;
  --text:#e8edf5; --muted:#4a6080;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(6,8,16,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.hdr-title{font-size:14px;font-weight:700;color:var(--accent);}
.hdr-sub{font-size:10px;color:var(--muted);}
.tabs{display:flex;gap:4px;margin-left:auto;}
.tab{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:5px 10px;font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;}
.tab.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}

.wrap{max-width:960px;margin:0 auto;padding:16px 12px;position:relative;z-index:1;}

/* FILTER */
.fbar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
.ftitle{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.fi label{display:block;font-size:10px;color:var(--muted);margin-bottom:3px;}
.fi select{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;
  font-family:'Noto Sans JP',sans-serif;outline:none;}
.fi select:focus{border-color:var(--accent);}
.fbtns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-family:'Noto Sans JP',sans-serif;
  font-weight:700;cursor:pointer;transition:all .15s;border:none;}
.btn-p{background:var(--accent);color:#000;}
.btn-p:hover{background:#33eaff;}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-o:hover{border-color:var(--accent);color:var(--accent);}

.meta{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;font-size:11px;color:var(--muted);}
.cnt{color:var(--accent);font-weight:700;font-size:13px;}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px;position:relative;overflow:hidden;transition:all .2s;}
.card.pass{border-color:rgba(0,230,118,.4);}
.card-top-bar{position:absolute;top:0;left:0;right:0;height:2px;border-radius:10px 10px 0 0;}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,229,255,.07);}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-name{font-size:14px;font-weight:700;}
.card-code{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
.sbadge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.sectors{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.stag{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;border:1px solid;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px;}
.met{text-align:center;}
.met-l{font-size:9px;color:var(--muted);}
.met-v{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.sbar-l{font-size:9px;color:var(--muted);margin-bottom:3px;}
.sbar{height:4px;background:var(--surface);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.sbar-f{height:100%;border-radius:2px;}
.cbtns{display:flex;gap:6px;margin-top:8px;}
.cbtn{flex:1;padding:6px;border-radius:6px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;border:1px solid;}
.cbtn-c{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.3);color:var(--accent);}
.cbtn-s{background:rgba(0,230,118,.1);border-color:rgba(0,230,118,.3);color:var(--green);}
.cbtn-r{background:rgba(255,145,0,.1);border-color:rgba(255,145,0,.3);color:var(--orange);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;
  display:none;align-items:flex-start;justify-content:center;padding:12px;overflow-y:auto;}
.overlay.on{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:720px;margin:auto;overflow:hidden;animation:mIn .22s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.mhdr{padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;}
.mtitle{font-size:16px;font-weight:700;}
.mcode{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
.mclose{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 6px;}
.mclose:hover{color:var(--text);}
.mtabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.mtab{flex-shrink:0;padding:10px 12px;text-align:center;font-size:11px;font-weight:700;
  cursor:pointer;color:var(--muted);border:none;background:none;
  font-family:'Noto Sans JP',sans-serif;border-bottom:2px solid transparent;transition:all .15s;}
.mtab.on{color:var(--accent);border-bottom-color:var(--accent);}
.mbody{padding:16px;}

/* TRADINGVIEW CHART */
.tv-wrap{background:var(--surface);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.tv-wrap iframe{display:block;width:100%;border:none;}

/* ENTRY REPORT */
.report-card{background:var(--surface);border-radius:10px;padding:14px;margin-bottom:12px;}
.report-title{font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--border);}

/* Big signal */
.big-signal{border-radius:12px;padding:14px 18px;margin-bottom:12px;text-align:center;}
.big-signal-label{font-size:18px;font-weight:700;margin-bottom:4px;}
.big-signal-sub{font-size:12px;opacity:.8;}

/* Order type badge */
.order-type{display:inline-flex;align-items:center;gap:8px;
  border-radius:8px;padding:10px 16px;font-size:14px;font-weight:700;margin-bottom:10px;}

/* Price table */
.ptable{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px;}
.ptable th{text-align:left;padding:6px 10px;background:rgba(0,0,0,.3);
  color:var(--muted);font-size:10px;letter-spacing:1px;font-weight:500;}
.ptable td{padding:9px 10px;border-bottom:1px solid var(--border);}
.ptable tr:last-child td{border-bottom:none;}
.ptag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.pt-buy{background:rgba(0,229,255,.15);color:var(--accent);}
.pt-sell{background:rgba(0,230,118,.15);color:var(--green);}
.pt-stop{background:rgba(255,61,90,.15);color:var(--red);}
.pt-wait{background:rgba(255,215,64,.15);color:var(--yellow);}

/* Checklist */
.checklist{display:flex;flex-direction:column;gap:6px;}
.chk-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
  background:rgba(0,0,0,.2);border-radius:6px;font-size:11px;line-height:1.5;}
.chk-icon{font-size:14px;flex-shrink:0;margin-top:1px;}

/* Sell reasons */
.sell-item{background:rgba(0,0,0,.2);border-radius:6px;padding:9px 11px;
  font-size:11px;display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;line-height:1.6;}

/* Fund boxes */
.fgrid2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px;}
.fbox{background:rgba(0,0,0,.25);border-radius:6px;padding:8px 10px;border:1px solid;}
.fbox-l{font-size:9px;color:var(--muted);}
.fbox-v{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px;}

.note{background:rgba(0,0,0,.2);border-radius:7px;padding:11px 12px;
  font-size:12px;color:#99aabb;line-height:1.7;border-left:3px solid var(--border);}

/* Progress bar for "position in range" */
.range-wrap{margin-bottom:12px;}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
.range-track{height:8px;background:var(--border);border-radius:4px;position:relative;}
.range-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--green));}
.range-dot{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:14px;height:14px;background:var(--yellow);border-radius:50%;border:2px solid var(--bg);}
.range-pct{text-align:center;font-size:11px;color:var(--accent);margin-top:4px;}

/* Print / Share */
.print-btn{background:rgba(255,145,0,.15);border:1px solid rgba(255,145,0,.3);
  color:var(--orange);border-radius:6px;padding:7px 14px;font-size:11px;
  font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.print-btn:hover{background:rgba(255,145,0,.25);}

@media(max-width:480px){
  .fgrid{grid-template-columns:repeat(2,1fr);}
  .grid{grid-template-columns:1fr;}
  .fgrid2{grid-template-columns:1fr;}
  .metrics{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

      <div class="fi"><label>テーマ</label>

    </div>
    <div class="fbtns">
      <button class="btn btn-p" onclick="applyFilter()">🔍 スクリーニング実行</button>
      <button class="btn btn-o" onclick="resetFilter()">リセット</button>
    </div>
  </div>
  <div class="meta">
    <span id="metaText">全 <span class="cnt" id="cnt">20</span> 銘柄</span>
    <span style="font-size:10px;color:var(--muted)">タップ → チャート / レポート</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="ov" onclick="ovClick(event)">
  <div class="modal">
    <div class="mhdr">
      <div><div class="mtitle" id="mName"></div><div class="mcode" id="mSub"></div></div>

    </div>

    <div class="mbody" id="mbody"></div>

</div>

var SEC_C={'DC':'color:#00d4ff;border-color:#00d4ff44;background:#00d4ff0f','半導体':'color:#b388ff;border-color:#b388ff44;background:#b388ff0f','防衛':'color:#ff9100;border-color:#ff910044;background:#ff91000f','電力インフラ':'color:#00e676;border-color:#00e67644;background:#00e6760f','素材':'color:#ffd740;border-color:#ffd74044;background:#ffd7400f'};
var ST_C={'未注目':'background:rgba(0,229,255,.15);color:var(--accent)','出遅れ':'background:rgba(0,230,118,.15);color:var(--green)','注目済み':'background:rgba(255,145,0,.15);color:var(--orange)','高騰済み':'background:rgba(255,61,90,.15);color:var(--red)'};

function sc(v){return v>=8?'var(--accent)':v>=6?'var(--green)':v>=4?'var(--yellow)':'var(--red)';}
function pc(v){return v<=15?'var(--green)':v<=19?'var(--yellow)':'var(--red)';}
function bc(v){return v<=2?'var(--green)':v<=3?'var(--yellow)':'var(--red)';}
function rc(v){return v>=10?'var(--green)':v>=8?'var(--yellow)':'var(--red)';}
function ec(v){return v>=50?'var(--green)':v>=40?'var(--yellow)':'var(--red)';}

function getVal(id,def){var el=document.getElementById(id);return el?el.value:def;}
function passes(c){
  var per=+(getVal("fPER","999")),pbr=+(getVal("fPBR","999")),
      roe=+(getVal("fROE","0")),eq=+(getVal("fEQ","0")),
      sec=getVal("fSec",""),st=getVal("fStat","");
  if(c.per>per||c.pbr>pbr||c.roe<roe||c.eq<eq) return false;
  if(sec&&c.sector.indexOf(sec)<0) return false;
  if(st&&c.status!==st) return false;
  return true;
}

function renderCards(list){
  var g=document.getElementById('grid');
  document.getElementById('cnt').textContent=list.length;
  g.innerHTML=list.map(function(c){
    var ok=passes(c);
    var secs=c.sector.map(function(s){return '<span class="stag" style="'+SEC_C[s]+'">'+s+'</span>';}).join('');
    var topColor=ok?'background:linear-gradient(90deg,var(--green),var(--accent))':'background:var(--border)';
    return '<div class="card'+(ok?' pass':'')+'">'
      +'<div class="card-top-bar" style="'+topColor+'"></div>'
      +'<div class="card-head"><div><div class="card-name">'+c.name+'</div><div class="card-code">'+c.code+'</div></div>'
      +'<span class="sbadge" style="'+ST_C[c.status]+'">'+c.status+'</span></div>'
      +'<div class="sectors">'+secs+'</div>'
      +'<div class="metrics">'
        +'<div class="met"><div class="met-l">PER</div><div class="met-v" style="color:'+pc(c.per)+'">'+c.per+'x</div></div>'
        +'<div class="met"><div class="met-l">PBR</div><div class="met-v" style="color:'+bc(c.pbr)+'">'+c.pbr+'x</div></div>'
        +'<div class="met"><div class="met-l">ROE</div><div class="met-v" style="color:'+rc(c.roe)+'">'+c.roe+'%</div></div>'
        +'<div class="met"><div class="met-l">自己資本</div><div class="met-v" style="color:'+ec(c.eq)+'">'+c.eq+'%</div></div>'
      +'</div>'
      +'<div class="sbar-l">未発掘スコア '+c.score+'/10</div>'
      +'<div class="sbar"><div class="sbar-f" style="width:'+(c.score*10)+'%;background:'+sc(c.score)+'"></div></div>'
      +'<div class="cbtns">'
        +'<button class="cbtn cbtn-c" onclick="openModal(\''+c.code+'\',0)">📈 チャート</button>'
        +'<button class="cbtn cbtn-s" onclick="openModal(\''+c.code+'\',1)">📋 レポート</button>'
      +'</div></div>';
  }).join('');
}

function applyFilter(){
  var list=COMPANIES.filter(passes);
  renderCards(list);
  document.getElementById('metaText').innerHTML='スクリーニング結果: <span class="cnt" id="cnt">'+list.length+'</span> 銘柄合格';
}

function resetFilter(){
  document.getElementById('fPER').value='15';document.getElementById('fPBR').value='3';
  document.getElementById('fROE').value='8';document.getElementById('fEQ').value='40';
  document.getElementById('fSec').value='';document.getElementById('fStat').value='';
  renderCards(COMPANIES);
  document.getElementById('metaText').innerHTML='全 <span class="cnt" id="cnt">20</span> 銘柄';
}

function switchView(v,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  if(el) el.classList.add('on');
  document.getElementById('fStat').value=v==='watch'?'未注目':'';
  if(v==='pass'||v==='watch') applyFilter(); else resetFilter();
}

// ── MODAL ──
var curCode=null,curTab=0;
function openModal(code,tab){
  curCode=code; curTab=tab||0;
  var c=COMPANIES.filter(function(x){return x.code===code;})[0];
  document.getElementById('mName').textContent=c.name;
  document.getElementById('mSub').textContent=code+' · '+c.sector.join(' / ');
  document.getElementById('ov').classList.add('on');
  showTab(curTab);
}
function closeModal(){document.getElementById('ov').classList.remove('on');}
function ovClick(e){if(e.target===document.getElementById('ov'))closeModal();}
function showTab(n){
  curTab=n;
  for(var i=0;i<4;i++){var t=document.getElementById('tab'+i);if(t)t.classList.toggle('on',i===n);}
  var c=COMPANIES.filter(function(x){return x.code===curCode;})[0];
  var body=document.getElementById('mbody');
  if(n===0) body.innerHTML=renderTVChart(c);
  else if(n===1) body.innerHTML=renderEntryReport(c);
  else if(n===2) body.innerHTML=renderSell(c);
  else body.innerHTML=renderFund(c);
}

    timing='25日移動平均線付近まで株価が下がったタイミング';
  } else {
    sigLabel='△ 条件不足（'+passCount+'/4）';sigBg='rgba(255,215,64,.12)';sigBorder='rgba(255,215,64,.4)';sigColor='var(--yellow)';

    '<tr><td><span class="ptag pt-buy">守り指値</span></td>'
      +'<td style="font-size:11px;color:var(--text)">25日MAの3〜5%下</td>'
      +'<td style="font-size:10px;color:var(--muted)">強いサポートライン水準</td></tr>',
    '<tr><td><span class="ptag pt-stop">逆指値(SL)</span></td>'
      +'<td style="font-size:11px;color:var(--red);font-weight:700">エントリー価格 × '+(1-slPct/100).toFixed(2)+'</td>'

    +'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">'+secs
    +'<span class="sbadge" style="'+ST_C[c.status]+';padding:3px 10px;font-size:11px">'+c.status+'</span></div>'
    +'<div style="font-size:11px;color:var(--muted)">未発掘スコア: <strong style="color:'+sc(c.score)+'">'+c.score+'/10</strong>'
    +'　時価総額: <strong style="color:var(--text)">'+(c.cap/10000).toFixed(1)+'兆円</strong>'
    +'　SL設定: <strong style="color:var(--red)">-'+c.sl+'%</strong></div></div>'
    +'<div class="report-card"><div class="report-title">■ 銘柄概要</div>'
    +'<div class="note">'+c.note+'</div></div>';
}

renderCards(COMPANIES);
</script>
</body>
</html>
